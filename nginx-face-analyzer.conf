server {
    listen 80;
    server_name face-analyzer-api.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name face-analyzer-api.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/face-analyzer-api.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/face-analyzer-api.duckdns.org/privkey.pem;

    client_max_body_size 15m;

    location / {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }
}
